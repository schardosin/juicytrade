services:
  # Core Trading Backend (Go)
  trade-backend:
    build: ./trade-backend-go
    ports:
      - "8008:8008"
    container_name: trade-backend
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8008
      - LOG_LEVEL=info
      - CORS_ALLOW_ORIGINS=http://localhost:3001,http://localhost:5173
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Vue.js)
  trade-app:
    build: ./trade-app
    ports:
      - "3001:80"
    container_name: trade-app
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8008
      - VITE_STRATEGY_API_URL=http://localhost:8009
    depends_on:
      - trade-backend

  # Strategy Simulation Service (Go) - On-Demand
  strategy-simulation:
    build: ./strategy-simulation-go
    ports:
      - "8009:8009"
    container_name: strategy-simulation
    restart: "no"  # On-demand - don't auto-restart
    profiles:
      - simulation  # Only start with: docker compose --profile simulation up
    environment:
      - HOST=0.0.0.0
      - PORT=8009
      - LOG_LEVEL=info
      - DATA_PATH=/app/data
      - PARQUET_PATH=/app/data/parquet
      - DBN_PATH=/app/data/dbn
      - DATABASE_PATH=/app/data/strategies/strategies.db
      - CORS_ALLOW_ORIGINS=http://localhost:3001,http://localhost:5173
    volumes:
      - ./data:/app/data  # Shared with other services
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

