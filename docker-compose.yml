services:
  # Core Trading Backend (Go)
  trade-backend:
    build: ./trade-backend-go
    ports:
      - "8008:8008"
    container_name: trade-backend
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8008
      - LOG_LEVEL=info
      - CORS_ALLOW_ORIGINS=http://localhost:3001,http://localhost:5173
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (Vue.js)
  trade-app:
    build: ./trade-app
    ports:
      - "3001:80"
    container_name: trade-app
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8008
      - VITE_STRATEGY_API_URL=http://localhost:8009
    depends_on:
      - trade-backend

  # Strategy Service (Python - backtesting, strategies + data-import)
  strategy-service:
    build: ./strategy-service
    ports:
      - "8009:8009"
    container_name: strategy-service
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8009
      - LOG_LEVEL=info
      - CORS_ALLOW_ORIGINS=http://localhost:3001,http://localhost:5173
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
