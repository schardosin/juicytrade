services:
  juicytrade:
    build: .
    ports:
      - "80:80"
    container_name: juicytrade
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/providers/available"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
