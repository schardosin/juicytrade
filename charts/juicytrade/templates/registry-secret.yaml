{{- if .Values.registryCredentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registryCredentials.name }}
  labels:
    {{- include "juicytrade.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"email\":\"%s\",\"auth\":\"%s\"}}}" .Values.registryCredentials.registry .Values.registryCredentials.username .Values.registryCredentials.password .Values.registryCredentials.email (printf "%s:%s" .Values.registryCredentials.username .Values.registryCredentials.password | b64enc) | b64enc }}
{{- end }}
